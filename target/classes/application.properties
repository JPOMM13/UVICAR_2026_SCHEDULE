spring.application.name=scheduler-base

# =========================
# AZURE KEY VAULT
# =========================
# Vault actual: kv-uvicar-prd-pe
# On-premise / fuera de Azure:
# - AZURE_CLIENT_ID
# - AZURE_TENANT_ID
# - AZURE_CLIENT_SECRET
spring.cloud.azure.profile.tenant-id=${AZURE_TENANT_ID:}
spring.cloud.azure.credential.client-id=${AZURE_CLIENT_ID:}
spring.cloud.azure.credential.client-secret=${AZURE_CLIENT_SECRET:}
spring.cloud.azure.keyvault.secret.property-source-enabled=${AZURE_KEYVAULT_ENABLED:true}
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=${AZURE_KEYVAULT_ENDPOINT:https://kv-uvicar-prd-pe.vault.azure.net/}
spring.cloud.azure.keyvault.secret.property-sources[0].secret-keys[0]=uvischedule-db-url
spring.cloud.azure.keyvault.secret.property-sources[0].secret-keys[1]=uvischedule-db-password

# =========================
# DATASOURCE SQL SERVER
# =========================
# Secretos esperados desde Azure Key Vault:
# - uvischedule-db-url
# - uvischedule-db-password
# Como respaldo, tambien se aceptan UVISCHEDULE_DB_URL y UVISCHEDULE_DB_PASSWORD.
spring.datasource.url=${uvischedule-db-url:${UVISCHEDULE_DB_URL:}}
spring.datasource.username=${UVICAR_DB_USERNAME:reporte}
spring.datasource.password=${uvischedule-db-password:${UVISCHEDULE_DB_PASSWORD:}}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# No usar schema.sql ni data.sql
spring.sql.init.mode=never

# =========================
# API (consulta por ventana tiempo calculada)
# =========================
uvicar.transmissions.table=tTransmisiones
uvicar.transmissions.last-minutes=10
uvicar.transmissions.top=200
uvicar.reports.clientes-grandes.sin-trans-3dias.sp=pa_RptUniActSinTrans3Dias_ClientesGrandes

# =========================
# JOBS
# =========================
jobs.timezone=America/Lima
jobs.seed.enabled=true
jobs.seed.cron=*/30 * * * * *
jobs.seed.rows-per-run=10
jobs.seed.disable-triggers=false
jobs.seed.report-compatible=true
# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.db.enabled=false

# =========================
# SERVER
# =========================
server.port=${SERVER_PORT:8081}
jobs.seed.use-templates=true
jobs.seed.templates.location=classpath:seed/transmission-templates.json
jobs.seed.allowed-cod-uni=24794,19207,-31865,32019,23737
