# =========================================================
# 1. Namespace
# Sirve para aislar este microservicio del resto del cluster.
# Todos los recursos de este archivo viven dentro de "uvischedule".
# =========================================================
apiVersion: v1
kind: Namespace
metadata:
  name: uvischedule
---
# =========================================================
# 2. ConfigMap
# Guarda configuracion NO sensible del microservicio.
# Aqui van flags, puertos, endpoint del Key Vault y valores
# que pueden cambiar sin reconstruir la imagen Docker.
# =========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: uvischedule-config
  namespace: uvischedule
data:
  SERVER_PORT: "${SERVER_PORT}"
  AZURE_KEYVAULT_ENABLED: "${AZURE_KEYVAULT_ENABLED}"
  AZURE_KEYVAULT_ENDPOINT: "${AZURE_KEYVAULT_ENDPOINT}"
  UVICAR_DB_USERNAME: "${UVICAR_DB_USERNAME}"
  JOBS_SEED_ENABLED: "${JOBS_SEED_ENABLED}"
  # Activa un modo de compatibilidad para SQL Server 2014/TLS 1.0.
  # Usarlo solo mientras no se pueda actualizar el servidor SQL a TLS 1.2.
  SQLSERVER_TLS_LEGACY_ENABLED: "true"
---
# =========================================================
# 3. Deployment
# Define como corre el microservicio:
# - cuantas replicas existen
# - que imagen Docker se usa
# - que variables recibe
# - probes de salud para K3s/Kubernetes
# - usa el Secret preexistente `azure-keyvault-secret`
# - limites y requests de CPU/Memoria
# =========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uvischedule
  namespace: uvischedule
  labels:
    app: uvischedule
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uvischedule
  template:
    metadata:
      labels:
        app: uvischedule
    spec:
      containers:
        - name: uvischedule
          # Esta imagen debe existir previamente en el nodo K3s,
          # importada con `sudo k3s ctr images import ...`
          image: localhost/uvischedule:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: uvischedule-config
            - secretRef:
                name: azure-keyvault-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# =========================================================
# 4. Service
# Expone el microservicio fuera del cluster usando NodePort,
# para consumirlo directamente por IP sin dominio.
# Ejemplo:
# http://IP_DEL_SERVIDOR:30081/api/transmissions
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: uvischedule
  namespace: uvischedule
spec:
  selector:
    app: uvischedule
  ports:
    - name: http
      port: 8081
      targetPort: http
      nodePort: 30081
  type: NodePort
